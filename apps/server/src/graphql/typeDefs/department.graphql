type Department {
  id: ID!
  name: String!
  budget: Float
  head: Employee
  parent: Department
  children: [Department!]!
  employees: [Employee!]!
  employeeCount: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type OrgNode {
  id: ID!
  name: String!
  title: String!
  avatar: String
  departmentName: String!
  children: [OrgNode!]!
}

input CreateDepartmentInput {
  name: String!
  budget: Float
  headId: ID
  parentDepartmentId: ID
}

input UpdateDepartmentInput {
  name: String
  budget: Float
  headId: ID
  parentDepartmentId: ID
}

extend type Query {
  departments: [Department!]!
  department(id: ID!): Department
  orgChart: [OrgNode!]!
}

extend type Mutation {
  createDepartment(input: CreateDepartmentInput!): Department!
  updateDepartment(id: ID!, input: UpdateDepartmentInput!): Department!
  deleteDepartment(id: ID!): Boolean!
}
